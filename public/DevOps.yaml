title: "🛠️ DevOps Engineer Roadmap"

nodes:
  # Main chain
  - id: devops_basics
    label: "🌐 DevOps Basics"
    resources:
      - title: "DevOps for Beginners"
        type: Video
        url: "https://www.youtube.com/watch?v=0yWAtQ6wYNM"

  - id: linux_networking
    label: "🐧 Linux & Networking"
    resources:
      - title: "Linux for DevOps"
        type: Video
        url: "https://www.youtube.com/watch?v=ROjZy1WbCIA"

  - id: version_control
    label: "🔀 Version Control"
    resources:
      - title: "Git & GitHub Full Course"
        type: Video
        url: "https://www.youtube.com/watch?v=apGV9Kg7ics"

  - id: ci_cd
    label: "⚙️ CI/CD Pipelines"
    resources:
      - title: "CI/CD Pipeline Tutorial"
        type: Video
        url: "https://www.youtube.com/watch?v=FtzNEdQu2gQ"

  - id: containerization
    label: "🐳 Containers & Orchestration"
    resources:
      - title: "Docker for Beginners"
        type: Video
        url: "https://www.youtube.com/watch?v=pTFZFxd4hOI"
      - title: "Kubernetes Basics"
        type: Article
        url: "https://kubernetes.io/docs/tutorials/kubernetes-basics/"

  - id: iac
    label: "📦 Infrastructure as Code"
    resources:
      - title: "Terraform Full Course"
        type: Video
        url: "https://www.youtube.com/watch?v=SLB_c_ayRMo"

  - id: cloud
    label: "☁️ Cloud Platforms"
    resources:
      - title: "AWS for Beginners"
        type: Course
        url: "https://www.youtube.com/watch?v=ulprqHHWlng"

  - id: monitoring
    label: "📡 Monitoring & Logging"
    resources:
      - title: "Prometheus & Grafana"
        type: Video
        url: "https://www.youtube.com/watch?v=h4Sl21AKiDg"

  - id: security
    label: "🔐 DevSecOps & Security"
    resources:
      - title: "DevSecOps Full Course"
        type: Video
        url: "https://www.youtube.com/watch?v=1qkq0HyKOMM"

