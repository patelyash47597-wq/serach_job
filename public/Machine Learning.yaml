title: "🤖 Machine Learning Engineer Roadmap"

nodes:
  # Main chain
  - id: ml_basics
    label: "🐍 ML Basics & Python"
    resources:
      - title: "Machine Learning for Beginners"
        type: Video
        url: "https://www.youtube.com/watch?v=Gv9_4yMHFhI"
      - title: "Python for ML"
        type: Course
        url: "https://www.kaggle.com/learn/python"

  - id: statistics_ml
    label: "📐 Statistics & Mathematics"
    resources:
      - title: "Math for Machine Learning"
        type: Course
        url: "https://www.coursera.org/specializations/mathematics-machine-learning"

  - id: data_preprocessing
    label: "🧹 Data Preprocessing"
    resources:
      - title: "Feature Engineering Tutorial"
        type: Video
        url: "https://www.youtube.com/watch?v=2XbD8OKmDZE"

  - id: algorithms
    label: "⚙️ ML Algorithms"
    resources:
      - title: "Supervised & Unsupervised Learning"
        type: Article
        url: "https://towardsdatascience.com/supervised-and-unsupervised-learning-14f68e32ea8d"

  - id: deep_learning
    label: "🧠 Deep Learning & Neural Nets"
    resources:
      - title: "Deep Learning Specialization"
        type: Course
        url: "https://www.coursera.org/specializations/deep-learning"
      - title: "Neural Networks from Scratch"
        type: Video
        url: "https://www.youtube.com/watch?v=aircAruvnKk"

  - id: nlp
    label: "💬 NLP & LLMs"
    resources:
      - title: "HuggingFace NLP Course"
        type: Course
        url: "https://huggingface.co/learn/nlp-course"

  - id: computer_vision
    label: "👁️ Computer Vision"
    resources:
      - title: "OpenCV Full Course"
        type: Video
        url: "https://www.youtube.com/watch?v=oXlwWbU8l2o"

  - id: mlops
    label: "🔧 MLOps & Pipelines"
    resources:
      - title: "MLOps Fundamentals"
        type: Course
        url: "https://www.coursera.org/learn/mlops-fundamentals"

  - id: deployment_ml
    label: "🚀 ML Deployment"
    resources:
      - title: "ML Model Deployment Guide"
        type: Video
        url: "https://www.youtube.com/watch?v=7eh4d6sabA0"

  - id: career_ml
    label: "💼 Career & Research"
    resources:
      - title: "ML Engineer Roadmap"
        type: Article
        url: "https://roadmap.sh/mlops"

